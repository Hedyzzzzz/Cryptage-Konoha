<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Sceau de la Sylve</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=JetBrains+Mono:wght@400;700&family=Manrope:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Palette "Forêt Secrète" */
            --primary: #2eb872; /* Vert feuille vif */
            --primary-dim: #1a6b40; /* Vert profond */
            --bg-deep: #050a06; /* Noir/Vert très sombre */
            --glass-bg: rgba(10, 20, 12, 0.75);
            --glass-border: rgba(46, 184, 114, 0.15);
            --text-main: #e0eee0;
            --text-muted: #7a9985;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Manrope', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- BACKGROUND ANIMATION (CANVAS) --- */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.8;
        }

        /* --- CONTAINER PRINCIPAL --- */
        .interface-wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 1100px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.9), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* DÉCORATIONS D'ANGLES (Style "Sceau") */
        .corner {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 2px solid var(--primary);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.5;
            border-radius: 3px;
        }
        .tl { top: 15px; left: 15px; border-right: none; border-bottom: none; }
        .tr { top: 15px; right: 15px; border-left: none; border-bottom: none; }
        .bl { bottom: 15px; left: 15px; border-right: none; border-top: none; }
        .br { bottom: 15px; right: 15px; border-left: none; border-top: none; }

        .interface-wrapper:hover .corner {
            width: 40px;
            height: 40px;
            opacity: 1;
            box-shadow: 0 0 20px rgba(46, 184, 114, 0.4);
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
            position: relative;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff, #8fbc8f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-shadow: 0 5px 15px rgba(46, 184, 114, 0.2);
        }

        .status-badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--primary);
            background: rgba(46, 184, 114, 0.1);
            padding: 5px 15px;
            border-radius: 2px;
            border: 1px solid rgba(46, 184, 114, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- MOTEUR DE TRADUCTION --- */
        .translator-grid {
            display: grid;
            grid-template-columns: 1fr 60px 1fr;
            gap: 20px;
            height: 400px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .panel-label {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
            letter-spacing: 1px;
        }

        textarea {
            flex: 1;
            background: rgba(0, 5, 0, 0.4);
            border: 1px solid #1a2a1f;
            border-radius: 4px;
            color: #fff;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            resize: none;
            line-height: 1.6;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        textarea:focus {
            border-color: var(--primary);
            background: rgba(0, 10, 0, 0.6);
            box-shadow: inset 0 0 30px rgba(46, 184, 114, 0.05);
        }

        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #2a3a2f; border-radius: 3px; }
        textarea::-webkit-scrollbar-thumb:hover { background: var(--primary-dim); }

        /* --- CONTROLES CENTRAUX --- */
        .controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .btn-action {
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .btn-action:hover {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 20px rgba(46, 184, 114, 0.2);
            transform: scale(1.1);
            background: rgba(46, 184, 114, 0.05);
        }

        .btn-translate-main { display: none; }

        /* --- NOTIFICATION COPIE --- */
        .copy-hint {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            background: rgba(0,0,0,0.8);
            padding: 5px 10px;
            border: 1px solid #1a2a1f;
            border-radius: 2px;
        }
        .input-group:hover .copy-hint { opacity: 0.8; }

        /* --- RESPONSIVE --- */
        @media (max-width: 850px) {
            .translator-grid {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto 1fr;
                height: auto;
            }
            .controls { flex-direction: row; padding: 10px 0; }
            .btn-action { transform: rotate(90deg); }
            .btn-action:hover { transform: rotate(90deg) scale(1.1); }
            textarea { height: 180px; }
            h1 { font-size: 1.8rem; }
            .btn-translate-main {
                display: flex;
                width: auto; height: auto; padding: 10px 20px;
                border-radius: 4px; font-family: 'Cinzel', serif;
                font-size: 0.9rem; transform: none;
            }
            .btn-translate-main:hover { transform: none; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="interface-wrapper">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <header>
            <h1>Le Sceau de la Sylve</h1>
            <div class="status-badge">Réseau Racine • V3.0</div>
        </header>

        <div class="translator-grid">
            <div class="input-group">
                <div class="panel-label">
                    <span id="lbl-src">Langue Racine (Clair)</span>
                    <span style="font-size:0.7em; opacity:0.5;">INPUT</span>
                </div>
                <textarea id="txt-src" placeholder="Déroulez votre parchemin ici..."></textarea>
            </div>

            <div class="controls">
                <button id="btn-swap" class="btn-action" title="Inverser les langues">⇄</button>
                <button id="btn-trans" class="btn-action btn-translate-main">TRADUIRE</button>
            </div>

            <div class="input-group">
                <div class="panel-label">
                    <span id="lbl-dest" style="color:var(--primary);">Sceau de Feuillage (Crypté)</span>
                    <span style="font-size:0.7em; opacity:0.5;">OUTPUT</span>
                </div>
                <textarea id="txt-dest" readonly placeholder="En attente de chakra..."></textarea>
                <div class="copy-hint" id="copy-msg">Cliquer pour copier</div>
            </div>
        </div>
    </div>

    <script>
        /* --- 1. NOUVEAU SYSTÈME DE CRYPTAGE (SCYTALE + ATBASH) --- */
        let modeFrancaisVersCode = true;
        const txtSrc = document.getElementById('txt-src');
        const txtDest = document.getElementById('txt-dest');
        const lblSrc = document.getElementById('lbl-src');
        const lblDest = document.getElementById('lbl-dest');
        const copyMsg = document.getElementById('copy-msg');

        // Fonction pour inverser l'alphabet (A->Z, B->Y)
        function applyAtbash(str) {
            return str.replace(/[A-Z]/g, char => {
                return String.fromCharCode(155 - char.charCodeAt(0));
            });
        }

        // Encodage : Nettoyage -> Atbash -> Transposition sur 5 colonnes
        function encode(text) {
            // Ne garder que les lettres et chiffres
            let clean = text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().replace(/[^A-Z0-9]/g, '');
            if (!clean) return "";

            let atbashStr = applyAtbash(clean);
            let cols = 5;
            let result = '';

            // Lecture en colonnes (Saut de N en N)
            for (let c = 0; c < cols; c++) {
                for (let i = c; i < atbashStr.length; i += cols) {
                    result += atbashStr[i];
                }
            }
            
            // Formatage par blocs de 4 lettres pour le style
            return result.match(/.{1,4}/g)?.join('-') || "";
        }

        // Décodage : Reconstitution de la grille -> Inversion Atbash
        function decode(text) {
            let clean = text.replace(/[^A-Z0-9]/g, '').toUpperCase();
            if (!clean) return "";

            let cols = 5;
            let rows = Math.ceil(clean.length / cols);
            let shortCols = (cols * rows) - clean.length; 
            let longCols = cols - shortCols;
            
            let result = new Array(clean.length);
            let k = 0;
            
            // Reconstruction de la chaîne d'origine
            for (let c = 0; c < cols; c++) {
                let currentRows = c < longCols ? rows : rows - 1;
                for (let r = 0; r < currentRows; r++) {
                    let index = r * cols + c;
                    result[index] = clean[k++];
                }
            }
            
            // Réappliquer Atbash (l'inversion s'annule elle-même) et mettre en minuscules
            return applyAtbash(result.join('')).toLowerCase();
        }

        function runTranslation() {
            const input = txtSrc.value;
            if(!input) { txtDest.value = ""; return; }
            txtDest.value = modeFrancaisVersCode ? encode(input) : decode(input);
        }

        txtSrc.addEventListener('input', runTranslation);
        document.getElementById('btn-trans').addEventListener('click', runTranslation);

        document.getElementById('btn-swap').addEventListener('click', () => {
            const contentSrc = txtSrc.value;
            const contentDest = txtDest.value;
            
            txtSrc.value = contentDest;
            txtDest.value = contentSrc; 
            modeFrancaisVersCode = !modeFrancaisVersCode;

            if(modeFrancaisVersCode) {
                lblSrc.textContent = "Langue Racine (Clair)";
                lblDest.textContent = "Sceau de Feuillage (Crypté)";
                lblDest.style.color = "var(--primary)";
                lblSrc.style.color = "var(--text-muted)";
                txtDest.setAttribute('readonly', true);
                txtSrc.removeAttribute('readonly');
            } else {
                lblSrc.textContent = "Sceau de Feuillage (Crypté)";
                lblSrc.style.color = "var(--primary)";
                lblDest.textContent = "Langue Racine (Clair)";
                lblDest.style.color = "var(--text-muted)";
                txtSrc.removeAttribute('readonly');
            }
            runTranslation();
        });

        txtDest.addEventListener('click', () => {
            if(!txtDest.value) return;
            txtDest.select();
            document.execCommand('copy');
            copyMsg.textContent = "SCEAU COPIÉ";
            copyMsg.style.color = "var(--primary)";
            copyMsg.style.borderColor = "var(--primary)";
            setTimeout(() => {
                copyMsg.textContent = "Cliquer pour copier";
                copyMsg.style.color = "var(--text-muted)";
                copyMsg.style.borderColor = "var(--glass-border)";
            }, 2000);
        });

        /* --- 2. EFFET VISUEL (FEUILLES / SPORES DANS LE VENT) --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(true); }
            reset(randomY = false) {
                this.x = Math.random() * width;
                this.y = randomY ? Math.random() * height : -10; // Commence en haut
                this.vy = Math.random() * 0.8 + 0.3; // Tombe doucement
                this.size = Math.random() * 2.5 + 0.5;
                this.alpha = Math.random() * 0.6 + 0.1;
                this.life = Math.random() * 100; // Utilisé pour l'oscillation
            }
            update() {
                this.life += 0.02;
                // Mouvement sinusoïdal pour simuler une feuille dans le vent
                this.x += Math.sin(this.life) * 0.8;
                this.y += this.vy;

                if (this.y > height + 10) this.reset();
                if (this.x > width + 10) this.x = -10;
                if (this.x < -10) this.x = width + 10;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                // Vert feuille légèrement lumineux
                ctx.fillStyle = `rgba(76, 184, 114, ${this.alpha})`; 
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

    </script>
</body>
</html>
